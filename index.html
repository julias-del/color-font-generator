<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aesthetic Studio</title>

  <!-- App UI fonts only -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg">

  <link rel="stylesheet" href="./css/styles.css"/>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <h1>Aesthetic Studio</h1>
      <div class="shortcuts" id="shortcutsBar">
        <span><kbd>Space</kbd> Shuffle</span>
        <span><kbd>S</kbd> Save</span>
        <span><kbd>C</kbd> Copy CSS</span>
        <span><kbd>L</kbd> Lock</span>
      </div>
    </div>

    <div class="actions">
      <button id="shuffleBtn">Shuffle</button>
      <button id="saveBtn">Save</button>
      <button id="copyBtn">Copy CSS</button>
      <button id="themeBtn">Theme</button>
    </div>
  </header>

  <main class="layout">

    <!-- CONTROLS -->
    <section class="panel">
      <h2>Controls</h2>

      <label>
        Base Color
        <input type="color" id="baseColor"/>
      </label>

      <label>
        Saturation
        <input type="range" id="saturation" min="20" max="100" value="70"/>
      </label>

      <label>
        Brightness
        <input type="range" id="lightness" min="20" max="80" value="55"/>
      </label>

      <label>
        Harmony
        <select id="harmony">
          <option value="random">Random</option>
          <option value="analogous">Analogous</option>
          <option value="complementary">Complementary</option>
          <option value="triadic">Triadic</option>
        </select>
      </label>
    </section>

    <!-- PALETTE -->
    <section class="panel">
      <h2>Palette</h2>
      <div id="palette" class="palette"></div>
    </section>

    <!-- PREVIEW -->
    <section class="panel preview">
      <h2>Preview</h2>

      <div class="mock">
        <h1>Design that feels intentional</h1>
        <p>Beautiful systems emerge from constraint, not randomness.</p>
        <button>Get Started</button>
      </div>
    </section>

    <!-- FAVORITES -->
    <section class="panel">
      <h2>Favorites</h2>
      <div id="favorites"></div>
    </section>

  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
